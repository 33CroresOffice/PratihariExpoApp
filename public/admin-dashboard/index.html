<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pratihari Nijog — Admin Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ── LOGIN ── -->
<section id="login-screen" class="login-screen">
  <div class="login-bg"></div>
  <div class="login-card">
    <div class="login-brand">
      <div class="brand-mark">JN</div>
      <div>
        <div class="brand-title">Pratihari Nijog</div>
        <div class="brand-sub">Shree Jagannatha Temple, Puri</div>
      </div>
    </div>
    <h1 class="login-heading">Admin Sign In</h1>
    <p class="login-sub">Sign in with your administrator credentials to manage sebayat applications.</p>
    <div id="login-error" class="alert alert-error"></div>
    <form id="login-form" autocomplete="on">
      <div class="field">
        <label for="email-input">Email address</label>
        <input id="email-input" type="email" placeholder="admin@example.com" required autocomplete="username" />
      </div>
      <div class="field">
        <label for="password-input">Password</label>
        <input id="password-input" type="password" placeholder="Enter your password" required autocomplete="current-password" />
      </div>
      <button class="btn btn-primary btn-block" id="login-btn" type="submit">Sign In</button>
    </form>
    <p class="login-hint">Forgot your password? <button type="button" class="link-action" id="forgot-link">Send reset email</button></p>
  </div>
</section>

<!-- ── APP ── -->
<div id="app" class="app">
  <!-- Topbar -->
  <header class="topbar">
    <button class="icon-btn topbar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="topbar-brand">
      <div class="brand-mark sm">JN</div>
      <div class="topbar-brand-text">
        <div class="topbar-title">Pratihari Nijog</div>
        <div class="topbar-sub">Admin Dashboard</div>
      </div>
    </div>
    <nav class="breadcrumb" id="breadcrumb"></nav>
    <div class="topbar-actions">
      <button class="icon-btn" id="refresh-btn" title="Refresh data">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      </button>
      <div class="notif-bell-wrap" id="notif-bell-wrap" style="position:relative;display:inline-flex">
        <button class="icon-btn" id="notif-bell-btn" title="Notifications" style="position:relative">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span id="notif-badge" style="display:none;position:absolute;top:2px;right:2px;background:#E8732A;color:#fff;border-radius:50%;width:16px;height:16px;font-size:10px;font-weight:700;line-height:16px;text-align:center;pointer-events:none">0</span>
        </button>
        <div id="notif-dropdown" style="display:none;position:absolute;top:calc(100% + 8px);right:0;width:360px;background:#fff;border:1px solid #E8D5C4;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,0.12);z-index:999;overflow:hidden">
          <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #F0E4D7">
            <span style="font-weight:600;font-size:14px;color:#2D1810">Notifications</span>
            <button id="notif-mark-all-read" style="background:none;border:none;cursor:pointer;font-size:12px;color:#E8732A;font-weight:500">Mark all read</button>
          </div>
          <div id="notif-list" style="max-height:360px;overflow-y:auto"></div>
          <div style="padding:10px 16px;border-top:1px solid #F0E4D7;text-align:center">
            <button id="notif-view-all" style="background:none;border:none;cursor:pointer;font-size:12px;color:#E8732A;font-weight:500">View all in Notification Log</button>
          </div>
        </div>
      </div>
      <div class="user-chip">
        <div class="user-avatar" id="user-avatar">A</div>
        <div class="user-info">
          <div class="user-name" id="user-name">Admin</div>
          <div class="user-role" id="user-role-display">Administrator</div>
        </div>
      </div>
      <button class="btn btn-ghost btn-sm" id="signout-btn">Sign out</button>
    </div>
  </header>

  <div class="app-body">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Overview</div>
        <button class="nav-item" data-view="overview">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          <span>Dashboard</span>
        </button>
      </div>
      <div class="sidebar-section">
        <!-- Sebayat Profiles parent toggle -->
        <button class="nav-item nav-parent" id="nav-sebayat-toggle" style="font-weight:600">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span>Sebayat Profiles</span>
          <svg id="nav-sebayat-chevron" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="flex-shrink:0;opacity:0.5;transition:transform 0.2s;margin-left:auto;transform:rotate(-90deg)"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <!-- Children — collapsed by default -->
        <div id="nav-sebayat-children" class="nav-children" style="display:none">
          <button class="nav-item nav-child" data-view="applications" data-filter="all">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <span>All Sebayats</span>
            <span class="badge-count" data-badge="all">0</span>
          </button>
          <button class="nav-item nav-child" data-view="applications" data-filter="submitted">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span>Pending Review</span>
            <span class="badge-count badge-blue" data-badge="submitted">0</span>
          </button>
          <button class="nav-item nav-child" data-view="applications" data-filter="resubmitted">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10"/></svg>
            <span>Resubmitted</span>
            <span class="badge-count badge-blue" data-badge="resubmitted">0</span>
          </button>
          <button class="nav-item nav-child" data-view="applications" data-filter="changes_requested">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4"/><path d="M12 17h.01"/><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>
            <span>Changes Requested</span>
            <span class="badge-count badge-amber" data-badge="changes_requested">0</span>
          </button>
          <button class="nav-item nav-child" data-view="applications" data-filter="approved">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            <span>Approved</span>
            <span class="badge-count badge-green" data-badge="approved">0</span>
          </button>
          <button class="nav-item nav-child" data-view="applications" data-filter="rejected">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            <span>Rejected</span>
            <span class="badge-count badge-red" data-badge="rejected">0</span>
          </button>
          <button class="nav-item nav-child" data-view="add_profile">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
            <span>Add Profile</span>
          </button>
          <button class="nav-item nav-child" data-view="manage_profiles">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <span>Manage Profiles</span>
          </button>
          <button class="nav-item nav-child" data-view="activity">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
            <span>Activity Log</span>
          </button>
        </div>
      </div>
      <div class="sidebar-section">
        <!-- Applications parent toggle -->
        <button class="nav-item nav-parent" id="nav-apps-toggle"  style="font-weight:600">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          <span>Applications</span>
          <svg id="nav-apps-chevron" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="flex-shrink:0;opacity:0.5;transition:transform 0.2s;margin-left:auto;transform:rotate(-90deg)"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <!-- Children — collapsed by default -->
        <div id="nav-apps-children" class="nav-children" style="display:none">
          <button class="nav-item nav-child" data-view="manage_applications" data-appfilter="all">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            <span>All Applications</span>
            <span class="badge-count" data-badge="apps_all" style="display:none">0</span>
          </button>
          <button class="nav-item nav-child" data-view="manage_applications" data-appfilter="pending">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span>Pending</span>
            <span class="badge-count badge-amber" data-badge="apps_pending" style="display:none">0</span>
          </button>
          <button class="nav-item nav-child" data-view="manage_applications" data-appfilter="under_review">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <span>Under Review</span>
            <span class="badge-count badge-blue" data-badge="apps_under_review" style="display:none">0</span>
          </button>
          <button class="nav-item nav-child" data-view="manage_applications" data-appfilter="approved">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            <span>Approved</span>
            <span class="badge-count badge-green" data-badge="apps_approved" style="display:none">0</span>
          </button>
          <button class="nav-item nav-child" data-view="manage_applications" data-appfilter="rejected">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            <span>Rejected</span>
            <span class="badge-count badge-red" data-badge="apps_rejected" style="display:none">0</span>
          </button>
          <button class="nav-item nav-child" data-view="manage_applications" data-appfilter="more_info_required">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span>More Info Required</span>
            <span class="badge-count badge-amber" data-badge="apps_more_info" style="display:none">0</span>
          </button>
          <button class="nav-item nav-child" data-view="app_types">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
            <span>App Types</span>
          </button>
        </div>
      </div>
      <div class="sidebar-section">
        <!-- Seba parent toggle -->
        <button class="nav-item nav-parent" id="nav-seba-toggle" style="font-weight:600">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
          <span>Seba</span>
          <svg id="nav-seba-chevron" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="flex-shrink:0;opacity:0.5;transition:transform 0.2s;margin-left:auto;transform:rotate(-90deg)"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <!-- Children — collapsed by default -->
        <div id="nav-seba-children" class="nav-children" style="display:none">
          <button class="nav-item nav-child" data-view="seba_today" id="nav-seba-today">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/><circle cx="18" cy="6" r="3" fill="#E8732A" stroke="none" id="seba-today-dot" style="display:none"/></svg>
            <span>Today's Seba</span>
            <span id="seba-today-inprogress-badge" style="display:none;margin-left:auto;min-width:8px;width:8px;height:8px;border-radius:50%;background:#E8732A;flex-shrink:0"></span>
          </button>
          <button class="nav-item nav-child" data-view="seba_calendar">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <span>Seba Calendar</span>
          </button>
          <button class="nav-item nav-child" data-view="seba_history">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span>Seba History</span>
          </button>
          <button class="nav-item nav-child" data-view="nijog_view">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>
            <span>Nijog Assignments</span>
          </button>
          <button class="nav-item nav-child" data-view="seba_assign">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/><path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/></svg>
            <span>Seba Assign</span>
          </button>
          <button class="nav-item nav-child" data-view="seba_categories">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h7"/><circle cx="17" cy="18" r="3"/><path d="M17 15v3l2 1"/></svg>
            <span>Seba Categories</span>
          </button>
        </div>
      </div>
      <div class="sidebar-section">
        <!-- Management parent toggle -->
        <button class="nav-item nav-parent" id="nav-mgmt-toggle" style="font-weight:600">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          <span>Management</span>
          <svg id="nav-mgmt-chevron" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="flex-shrink:0;opacity:0.5;transition:transform 0.2s;margin-left:auto;transform:rotate(-90deg)"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div id="nav-mgmt-children" class="nav-children" style="display:none">
          <button class="nav-item nav-child" data-view="notices">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span>Notices</span>
            <span class="badge-count badge-blue" data-badge="notices_draft" style="display:none">0</span>
          </button>
          <button class="nav-item nav-child" data-view="committees">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <span>Committee</span>
          </button>
          <button class="nav-item nav-child" data-view="event_images">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            <span>Event Images</span>
          </button>
        </div>
      </div>
      <div class="sidebar-section" id="nav-settings-section" style="display:none">
        <!-- Settings parent toggle (super admin only) -->
        <button class="nav-item nav-parent" id="nav-settings-toggle" style="font-weight:600">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <span>Settings</span>
          <svg id="nav-settings-chevron" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="flex-shrink:0;opacity:0.5;transition:transform 0.2s;margin-left:auto;transform:rotate(-90deg)"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div id="nav-settings-children" class="nav-children" style="display:none">
          <button class="nav-item nav-child" data-view="admins">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            <span>Admin Users</span>
          </button>
          <button class="nav-item nav-child" data-view="roles" id="nav-roles-item">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <span>Roles &amp; Permissions</span>
          </button>
          <button class="nav-item nav-child" data-view="settings">
