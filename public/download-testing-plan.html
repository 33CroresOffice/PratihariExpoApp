function generate() {
  var btn = document.getElementById('dlBtn');
  var status = document.getElementById('status');
  btn.disabled = true;
  status.textContent = 'Generating workbook…';

  setTimeout(function() {
    try {
      var wb = XLSX.utils.book_new();

      // ── Sheet 1: Test Cases ──────────────────
      var header = [["Test ID","Module Code","Module Name","Test Case Title","Priority","Status","Description"]];
      var rows = header.concat(TEST_CASES);
      var ws1 = XLSX.utils.aoa_to_sheet(rows);

      // Column widths
      ws1['!cols'] = [
        {wch:20},{wch:14},{wch:34},{wch:46},{wch:10},{wch:10},{wch:90}
      ];

      // Freeze top row
      ws1['!freeze'] = {xSplit:0, ySplit:1};

      // Style header row (bold + fill) — basic xlsx supports inline styles via s property
      var range = XLSX.utils.decode_range(ws1['!ref']);
      for (var C = range.s.c; C <= range.e.c; C++) {
        var addr = XLSX.utils.encode_cell({r:0, c:C});
        if (!ws1[addr]) continue;
        ws1[addr].s = {
          font: { bold: true, color: { rgb: "FFFFFF" } },
          fill: { fgColor: { rgb: "1A3A5C" } },
          alignment: { horizontal: "center", wrapText: true }
        };
      }

      XLSX.utils.book_append_sheet(wb, ws1, 'Test Cases');

      // ── Sheet 2: Module Summary ──────────────
      var ws2 = XLSX.utils.aoa_to_sheet(SUMMARY);
      ws2['!cols'] = [{wch:16},{wch:38},{wch:8},{wch:8},{wch:8},{wch:8}];
      // Header row style
      for (var C2 = 0; C2 < 6; C2++) {
        var a2 = XLSX.utils.encode_cell({r:0, c:C2});
        if (!ws2[a2]) continue;
        ws2[a2].s = {
          font: { bold: true, color: { rgb: "FFFFFF" } },
          fill: { fgColor: { rgb: "1A3A5C" } },
          alignment: { horizontal: "center" }
        };
      }
      // Total row style (last row)
      var lastR = SUMMARY.length - 1;
      for (var C3 = 0; C3 < 6; C3++) {
        var a3 = XLSX.utils.encode_cell({r:lastR, c:C3});
        if (!ws2[a3]) continue;
        ws2[a3].s = {
          font: { bold: true },
          fill: { fgColor: { rgb: "E9ECEF" } }
        };
      }
      XLSX.utils.book_append_sheet(wb, ws2, 'Module Summary');

      // ── Sheet 3: P1 Critical ─────────────────
      var p1Header = [["Test ID","Module Code","Module Name","Test Case Title","Status","Description"]];
      var p1Rows = TEST_CASES.filter(function(r){ return r[3]==="P1"; })
        .map(function(r){ return [r[0],r[1],r[2],r[3],r[5],r[6]]; });
      var ws3 = XLSX.utils.aoa_to_sheet(p1Header.concat(p1Rows));
      ws3['!cols'] = [{wch:20},{wch:14},{wch:34},{wch:46},{wch:10},{wch:90}];
      for (var C4 = 0; C4 < 6; C4++) {
        var a4 = XLSX.utils.encode_cell({r:0, c:C4});
        if (!ws3[a4]) continue;
        ws3[a4].s = {
          font: { bold: true, color: { rgb: "FFFFFF" } },
          fill: { fgColor: { rgb: "856404" } },
          alignment: { horizontal: "center" }
        };
      }
      XLSX.utils.book_append_sheet(wb, ws3, 'P1 Critical (' + p1Rows.length + ')');

      // ── Sheet 4: RTM (pivot by module) ───────
      var rtmHeader = [["Test ID","Module","Feature / Module Name","Test Title","Priority","Status"]];
      var rtmRows = TEST_CASES.map(function(r){
        return [r[0], r[1], r[2], r[3], r[4], r[5]];
      });
      var ws4 = XLSX.utils.aoa_to_sheet(rtmHeader.concat(rtmRows));
      ws4['!cols'] = [{wch:20},{wch:14},{wch:36},{wch:46},{wch:10},{wch:10}];
      for (var C5 = 0; C5 < 6; C5++) {
        var a5 = XLSX.utils.encode_cell({r:0, c:C5});
        if (!ws4[a5]) continue;
        ws4[a5].s = {
          font: { bold: true, color: { rgb: "FFFFFF" } },
          fill: { fgColor: { rgb: "1A3A5C" } },
          alignment: { horizontal: "center" }
        };
      }
      XLSX.utils.book_append_sheet(wb, ws4, 'RTM');

      XLSX.writeFile(wb, 'Pratihari_Nijog_Testing_Plan_v1.0.xlsx');
      status.textContent = 'Download started! Check your Downloads folder.';
      btn.disabled = false;
    } catch(e) {
      status.textContent = 'Error: ' + e.message;
      btn.disabled = false;
    }
  }, 50);
}

// Auto-trigger download on page load
window.onload = function() {
  setTimeout(generate, 600);
};
